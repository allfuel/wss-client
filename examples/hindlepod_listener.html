<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindlepod WebSocket Listener</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: monospace; background: #1a1a2e; color: #eee; margin: 0; padding: 20px; }

        /* Header */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .header h1 { color: #00d9ff; margin: 0; font-size: 1.3em; }
        .badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
        .badge-ws { background: #1a2a1a; border: 1px solid #2a4a2a; }
        .badge-ws .dot { background: #4caf50; }
        .badge-ws.disconnected { border-color: #4a2a2a; }
        .badge-ws.disconnected .dot { background: #f44336; }
        .badge-members { background: #1a2a3a; border: 1px solid #2a4a6a; color: #90caf9; }
        .badge-runner { background: #1a2a1a; border: 1px solid #2a4a2a; color: #4caf50; }
        .badge-runner.paused { background: #3d3d0a; border-color: #5a5a2a; color: #ffeb3b; }
        .badge-daemon { background: #1a2a1a; border: 1px solid #2a4a2a; color: #4caf50; }
        .badge-daemon .dot { background: #4caf50; }
        .badge-daemon.offline { background: #2a1a1a; border-color: #4a2a2a; color: #f44336; }
        .badge-daemon.offline .dot { background: #f44336; }
        .badge-browser { background: #1a2a3a; border: 1px solid #2a4a6a; color: #90caf9; }
        .badge-browser.offline { background: #2a1a1a; border-color: #4a2a2a; color: #666; }
        .hidden { display: none !important; }
        .disabled-overlay { opacity: 0.4; pointer-events: none; }

        /* Controls */
        .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .controls button { background: #00d9ff; color: #1a1a2e; border: none; padding: 6px 12px; border-radius: 4px; font-family: monospace; font-weight: bold; cursor: pointer; font-size: 0.85em; }
        .controls button:hover { background: #00b8d4; }
        .controls button:disabled { background: #555; color: #999; cursor: not-allowed; }
        .controls button.paused { background: #4caf50; }
        .controls button.paused:hover { background: #388e3c; }

        /* Add form */
        .add-form { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; }
        .add-form input[type="text"] { background: #0d0d1a; border: 1px solid #333; color: #eee; padding: 6px 10px; border-radius: 4px; font-family: monospace; flex: 1; font-size: 0.9em; }
        .add-form input[type="text"]:focus { outline: none; border-color: #00d9ff; }
        .add-form select { background: #0d0d1a; border: 1px solid #333; color: #eee; padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .add-form select:focus { outline: none; border-color: #00d9ff; }
        .add-form button { background: #00d9ff; color: #1a1a2e; border: none; padding: 6px 12px; border-radius: 4px; font-family: monospace; font-weight: bold; cursor: pointer; font-size: 0.85em; }
        .add-form button:hover { background: #00b8d4; }

        /* Kanban board */
        .kanban { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .kanban-col { background: #0d0d1a; border: 1px solid #333; border-radius: 6px; padding: 12px; min-height: 120px; }
        .kanban-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #222; }
        .kanban-col-title { font-weight: bold; font-size: 0.9em; }
        .kanban-col-title.ready { color: #4caf50; }
        .kanban-col-title.in-progress { color: #00d9ff; }
        .kanban-col-count { background: #333; color: #999; padding: 2px 7px; border-radius: 10px; font-size: 0.75em; }
        .kanban-card { background: #1a1a2e; border: 1px solid #333; border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; }
        .kanban-card:last-child { margin-bottom: 0; }
        .kanban-card .card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .kanban-card .card-id { color: #00d9ff; font-weight: bold; font-size: 0.85em; }
        .kanban-card .card-complexity { color: #666; font-size: 0.75em; background: #222; padding: 1px 5px; border-radius: 3px; }
        .kanban-card .card-title { color: #ccc; font-size: 0.85em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .kanban-card .card-agent { color: #ff9800; font-size: 0.8em; margin-top: 4px; }
        .kanban-card .card-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; display: inline-block; animation: pulse 1.5s infinite; }
        .kanban-empty { color: #555; font-size: 0.85em; font-style: italic; }

        /* Log section */
        .log-section { margin-top: 10px; }
        .log-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 0; user-select: none; }
        .log-header:hover .log-title { color: #00d9ff; }
        .log-arrow { color: #666; font-size: 0.8em; transition: transform 0.2s; }
        .log-arrow.open { transform: rotate(90deg); }
        .log-title { color: #888; font-size: 0.9em; font-weight: bold; transition: color 0.2s; }
        .log-count { color: #555; font-size: 0.8em; }
        #log { background: #0d0d1a; border: 1px solid #333; border-radius: 4px; padding: 12px; max-height: 40vh; overflow-y: auto; display: none; }
        #log.open { display: block; }
        .entry { border-bottom: 1px solid #222; padding: 6px 0; font-size: 0.85em; }
        .entry:last-child { border-bottom: none; }
        .timestamp { color: #888; }
        .event-name { color: #00d9ff; font-weight: bold; }
        .channel { color: #ff9800; }
        .data { color: #8bc34a; white-space: pre-wrap; margin-top: 4px; }
        .error { color: #f44336; }
        .info { color: #9e9e9e; }
        .raw { color: #666; font-size: 0.85em; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <!-- Header with badges -->
    <div class="header">
        <h1>Fuel Dashboard</h1>
        <div class="badges">
            <span id="badge-ws" class="badge badge-ws disconnected"><span class="dot"></span> <span id="badge-ws-text">Disconnected</span></span>
            <span id="badge-daemon" class="badge badge-daemon offline"><span class="dot"></span> <span id="badge-daemon-text">Daemon: offline</span></span>
            <span id="badge-members" class="badge badge-members">0 members</span>
            <span id="badge-runner" class="badge badge-runner hidden">Consuming</span>
            <span id="badge-browser" class="badge badge-browser offline hidden">Browser: offline</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button id="btn-epics" disabled onclick="requestEpics()">Epics</button>
        <button id="btn-blocked" disabled onclick="requestBlockedTasks()">Blocked</button>
        <button id="btn-completed" disabled onclick="requestCompletedTasks()">Completed</button>
        <button id="btn-snapshot" disabled onclick="requestSnapshot()">Snapshot</button>
        <button id="btn-reload" disabled onclick="reloadConfig()">Reload</button>
        <button id="btn-pause" disabled onclick="togglePause()">Pause</button>
    </div>

    <!-- Add task form -->
    <div class="add-form disabled-overlay">
        <input type="text" id="task-title" placeholder="New task title..." disabled />
        <select id="task-complexity" disabled>
            <option value="trivial">trivial</option>
            <option value="simple" selected>simple</option>
            <option value="moderate">moderate</option>
            <option value="complex">complex</option>
        </select>
        <button onclick="createTask()" disabled>Add</button>
    </div>

    <!-- Kanban board -->
    <div class="kanban">
        <div class="kanban-col">
            <div class="kanban-col-header">
                <span class="kanban-col-title ready">Ready</span>
                <span id="ready-count" class="kanban-col-count">0</span>
            </div>
            <div id="kanban-ready"><span class="kanban-empty">No tasks</span></div>
        </div>
        <div class="kanban-col">
            <div class="kanban-col-header">
                <span class="kanban-col-title in-progress">In Progress</span>
                <span id="progress-count" class="kanban-col-count">0</span>
            </div>
            <div id="kanban-progress"><span class="kanban-empty">No tasks</span></div>
        </div>
    </div>

    <!-- Collapsible log -->
    <div class="log-section">
        <div class="log-header" onclick="toggleLog()">
            <span id="log-arrow" class="log-arrow">&#9654;</span>
            <span class="log-title">Event Log</span>
            <span id="log-count" class="log-count">(0)</span>
        </div>
        <div id="log"></div>
    </div>

    <script>
        const config = {
            host: 'wss.vask.dev',
            port: 443,
            appKey: 'hindlepod2-dev-wnffgg',
            appSecret: '157bad2c029878243d2d818bc759faee2c14a8e9bec2728465d37f9da8a3bcac',
        };

        const channel = 'presence-fuel-9857ecbe-51dc-4143-90b3-baa1ee036bc0';
        const userId = 'browser-' + Math.random().toString(36).substr(2, 8);
        const userName = 'Browser ' + userId.slice(-4);

        let ws = null;
        let socketId = null;
        let daemonPaused = false;
        let daemonConnected = false;
        let memberCount = 0;
        let browserOnline = false;
        let logEntryCount = 0;
        let hasReceivedSnapshot = false;
        const members = new Set();
        const activeTasks = new Map();
        let readyTasks = [];
        let inProgressTasks = [];

        const logEl = document.getElementById('log');

        // --- UI Functions ---

        function log(type, message, data = null) {
            const entry = document.createElement('div');
            entry.className = 'entry';
            const ts = new Date().toISOString().substr(11, 12);

            let html = `<span class="timestamp">[${ts}]</span> `;

            if (type === 'event') {
                html += `<span class="event-name">${message.event}</span>`;
                if (message.channel) {
                    html += ` <span class="channel">${message.channel}</span>`;
                }
                if (data) {
                    html += `<div class="data">${JSON.stringify(data, null, 2)}</div>`;
                }
            } else if (type === 'error') {
                html += `<span class="error">ERROR: ${message}</span>`;
            } else if (type === 'info') {
                html += `<span class="info">${message}</span>`;
            } else if (type === 'raw') {
                html += `<span class="raw">RAW: ${message}</span>`;
            }

            entry.innerHTML = html;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
            logEntryCount++;
            document.getElementById('log-count').textContent = `(${logEntryCount})`;
        }

        function toggleLog() {
            const logEl = document.getElementById('log');
            const arrow = document.getElementById('log-arrow');
            logEl.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        function isDaemonMember(id) {
            return id && !id.startsWith('browser-');
        }

        function checkDaemonPresence() {
            const wasDaemonConnected = daemonConnected;
            daemonConnected = Array.from(members).some(isDaemonMember);
            if (wasDaemonConnected !== daemonConnected) {
                updateControlsState();
                if (daemonConnected) {
                    // Daemon just came online - request a snapshot to get current state
                    sendIpcCommand('request_snapshot', 'Requesting snapshot');
                } else {
                    hasReceivedSnapshot = false;
                    readyTasks = [];
                    inProgressTasks = [];
                    activeTasks.clear();
                    renderKanban();
                }
            }
        }

        function updateControlsState() {
            const enabled = daemonConnected;
            document.querySelectorAll('.controls button').forEach(b => b.disabled = !enabled);
            document.querySelectorAll('.add-form input, .add-form select, .add-form button').forEach(el => el.disabled = !enabled);
            document.querySelector('.add-form').classList.toggle('disabled-overlay', !enabled);
            document.querySelector('.kanban').classList.toggle('disabled-overlay', !enabled && !hasReceivedSnapshot);
        }

        function updateBadges() {
            // WebSocket badge
            const wsBadge = document.getElementById('badge-ws');
            const wsText = document.getElementById('badge-ws-text');
            if (socketId) {
                wsBadge.classList.remove('disconnected');
                wsText.textContent = 'Connected';
            } else {
                wsBadge.classList.add('disconnected');
                wsText.textContent = 'Disconnected';
            }

            // Daemon badge
            const daemonBadge = document.getElementById('badge-daemon');
            const daemonText = document.getElementById('badge-daemon-text');
            if (daemonConnected) {
                daemonBadge.classList.remove('offline');
                daemonText.textContent = 'Daemon: online';
            } else {
                daemonBadge.classList.add('offline');
                daemonText.textContent = 'Daemon: offline';
            }

            // Members badge
            document.getElementById('badge-members').textContent = `${memberCount} member${memberCount !== 1 ? 's' : ''}`;

            // Runner badge (only show after first snapshot)
            const runnerBadge = document.getElementById('badge-runner');
            runnerBadge.classList.toggle('hidden', !hasReceivedSnapshot);
            if (hasReceivedSnapshot) {
                if (daemonPaused) {
                    runnerBadge.textContent = 'Paused';
                    runnerBadge.classList.add('paused');
                } else {
                    runnerBadge.textContent = 'Consuming';
                    runnerBadge.classList.remove('paused');
                }
            }

            // Browser badge (only show after first snapshot)
            const browserBadge = document.getElementById('badge-browser');
            browserBadge.classList.toggle('hidden', !hasReceivedSnapshot);
            if (hasReceivedSnapshot) {
                if (browserOnline) {
                    browserBadge.textContent = 'Browser: online';
                    browserBadge.classList.remove('offline');
                } else {
                    browserBadge.textContent = 'Browser: offline';
                    browserBadge.classList.add('offline');
                }
            }
        }

        function updatePauseButton() {
            const btn = document.getElementById('btn-pause');
            btn.textContent = daemonPaused ? 'Resume' : 'Pause';
            btn.classList.toggle('paused', daemonPaused);
        }

        function renderKanban() {
            // Ready column
            const readyEl = document.getElementById('kanban-ready');
            document.getElementById('ready-count').textContent = readyTasks.length;
            if (!readyTasks.length) {
                readyEl.innerHTML = '<span class="kanban-empty">No tasks</span>';
            } else {
                readyEl.innerHTML = readyTasks.map(task => {
                    const id = task.short_id || task.id || '?';
                    const complexity = task.complexity ? `<span class="card-complexity">${task.complexity}</span>` : '';
                    return `<div class="kanban-card">
                        <div class="card-header"><span class="card-id">${id}</span>${complexity}</div>
                        <div class="card-title">${task.title || 'untitled'}</div>
                    </div>`;
                }).join('');
            }

            // In Progress column
            const progressEl = document.getElementById('kanban-progress');
            const progressList = inProgressTasks.length ? inProgressTasks : Array.from(activeTasks.values());
            document.getElementById('progress-count').textContent = progressList.length;
            if (!progressList.length) {
                progressEl.innerHTML = '<span class="kanban-empty">No tasks</span>';
            } else {
                progressEl.innerHTML = progressList.map(task => {
                    const id = task.short_id || task.task_id || task.id || '?';
                    const title = task.title || '';
                    const agent = task.agent ? `<div class="card-agent"><span class="card-dot"></span> ${task.agent}</div>` : '';
                    const complexity = task.complexity ? `<span class="card-complexity">${task.complexity}</span>` : '';
                    return `<div class="kanban-card">
                        <div class="card-header"><span class="card-id">${id}</span>${complexity}</div>
                        ${title ? `<div class="card-title">${title}</div>` : ''}
                        ${agent}
                    </div>`;
                }).join('');
            }
        }

        // --- Commands ---

        function createTask() {
            const titleEl = document.getElementById('task-title');
            const complexityEl = document.getElementById('task-complexity');
            const title = titleEl.value.trim();

            if (!title) { log('error', 'Task title is required'); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN || !daemonConnected) { log('error', 'Daemon not connected'); return; }

            const msg = {
                event: 'client-fuel-ipc',
                channel: channel,
                data: JSON.stringify({
                    type: 'task_create',
                    timestamp: new Date().toISOString(),
                    instance_id: userId,
                    request_id: null,
                    title: title,
                    description: null,
                    labels: null,
                    priority: null,
                    task_type: null,
                    complexity: complexityEl.value,
                    epic_id: null,
                    blocked_by: null
                })
            };

            log('info', `Creating task: "${title}" (${complexityEl.value})`);
            ws.send(JSON.stringify(msg));
            titleEl.value = '';
        }

        function sendIpcCommand(type, label) {
            if (!ws || ws.readyState !== WebSocket.OPEN || !daemonConnected) { log('error', 'Daemon not connected'); return; }
            const msg = {
                event: 'client-fuel-ipc',
                channel: channel,
                data: JSON.stringify({
                    type: type,
                    timestamp: new Date().toISOString(),
                    instance_id: userId,
                    request_id: null
                })
            };
            log('info', `${label}...`);
            ws.send(JSON.stringify(msg));
        }

        function togglePause() {
            const commandType = daemonPaused ? 'resume' : 'pause';
            sendIpcCommand(commandType, daemonPaused ? 'Resuming' : 'Pausing');
        }

        function requestEpics() { sendIpcCommand('request_epics', 'Requesting epics'); }
        function requestBlockedTasks() { sendIpcCommand('request_blocked_tasks', 'Requesting blocked tasks'); }
        function requestCompletedTasks() { sendIpcCommand('request_completed_tasks', 'Requesting completed tasks'); }
        function requestSnapshot() { sendIpcCommand('request_snapshot', 'Requesting snapshot'); }
        function reloadConfig() { sendIpcCommand('reload_config', 'Reloading config'); }

        // --- Auth ---

        async function hmacSHA256(message, secret) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const messageData = encoder.encode(message);
            const key = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
            const signature = await crypto.subtle.sign('HMAC', key, messageData);
            return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function subscribe() {
            const channelData = JSON.stringify({ user_id: userId, user_info: { name: userName } });
            const stringToSign = `${socketId}:${channel}:${channelData}`;
            const signature = await hmacSHA256(stringToSign, config.appSecret);
            const subscribeMsg = {
                event: 'pusher:subscribe',
                data: { channel: channel, auth: `${config.appKey}:${signature}`, channel_data: channelData }
            };
            log('info', `Subscribing to ${channel} as ${userName}`);
            ws.send(JSON.stringify(subscribeMsg));
        }

        // --- Connection ---

        function connect() {
            log('info', `Connecting to wss://${config.host}:${config.port}`);
            const url = `wss://${config.host}:${config.port}/app/${config.appKey}?protocol=7&client=js&version=8.0.0`;
            ws = new WebSocket(url);

            ws.onopen = () => {
                log('info', 'WebSocket opened, waiting for pusher:connection_established');
            };

            ws.onmessage = async (event) => {
                log('raw', event.data);
                try {
                    const msg = JSON.parse(event.data);
                    let data = msg.data;
                    if (typeof data === 'string') {
                        try { data = JSON.parse(data); } catch {}
                    }

                    log('event', msg, data);

                    // --- Pusher events ---
                    if (msg.event === 'pusher:connection_established') {
                        socketId = data.socket_id;
                        log('info', `Socket ID: ${socketId}`);
                        updateBadges();
                        await subscribe();
                    }
                    else if (msg.event === 'pusher_internal:subscription_succeeded') {
                        log('info', `Subscribed to ${msg.channel}`);
                        if (data?.presence) {
                            memberCount = data.presence.count || 0;
                            members.clear();
                            const ids = data.presence.ids || Object.keys(data.presence.hash || {});
                            ids.forEach(id => members.add(id));
                            checkDaemonPresence();
                            updateControlsState();
                            updateBadges();
                        }
                    }
                    else if (msg.event === 'pusher_internal:member_added') {
                        const memberId = data?.user_id || '';
                        members.add(memberId);
                        memberCount = members.size;
                        checkDaemonPresence();
                        updateBadges();
                        const name = data?.user_info?.name || memberId || 'unknown';
                        log('info', `Member joined: ${name}`);
                    }
                    else if (msg.event === 'pusher_internal:member_removed') {
                        const memberId = data?.user_id || '';
                        members.delete(memberId);
                        memberCount = members.size;
                        checkDaemonPresence();
                        updateBadges();
                        log('info', `Member left: ${memberId || 'unknown'}`);
                    }
                    else if (msg.event === 'pusher:error') {
                        log('error', data?.message || JSON.stringify(data));
                    }

                    // --- IPC events ---
                    else if (msg.event === 'client-fuel-ipc' && data?.type === 'snapshot') {
                        hasReceivedSnapshot = true;
                        const snap = data.snapshot || {};
                        if (snap.runner_state) {
                            daemonPaused = !!snap.runner_state.paused;
                            updatePauseButton();
                            updateBadges();
                        }
                        if (snap.browser_daemon) {
                            browserOnline = !!snap.browser_daemon.running;
                            updateBadges();
                        }
                        // Extract task queues from board_state
                        const board = snap.board_state || {};
                        const ready = board.ready || [];
                        if (Array.isArray(ready)) { readyTasks = ready; }
                        const progress = board.in_progress || [];
                        if (Array.isArray(progress)) { inProgressTasks = progress; }
                        renderKanban();
                    }
                    else if (msg.event === 'client-fuel-ipc' && data?.type === 'task_create_response') {
                        if (data.success) {
                            log('info', `Task created: ${data.task_id}`);
                        } else {
                            log('error', `Task creation failed: ${data.error || 'unknown error'}`);
                        }
                    }
                    else if (msg.event === 'client-fuel-ipc' && data?.type === 'task_spawned') {
                        activeTasks.set(data.run_id, {
                            task_id: data.task_id,
                            agent: data.agent,
                            run_id: data.run_id,
                            timestamp: data.timestamp
                        });
                        renderKanban();
                        log('info', `Task spawned: ${data.task_id} on ${data.agent} (${data.run_id})`);
                    }
                    else if (msg.event === 'client-fuel-ipc' && data?.type === 'task_completed') {
                        activeTasks.delete(data.run_id);
                        renderKanban();
                        const exitLabel = data.exit_code === 0 ? 'success' : `exit ${data.exit_code}`;
                        log('info', `Task completed: ${data.task_id} (${exitLabel}, ${data.completion_type})`);
                    }
                    else if (msg.event === 'client-fuel-ipc' && data?.type === 'epics') {
                        log('info', `Received ${data.total || 0} epics`);
                        if (data.epics && Array.isArray(data.epics)) {
                            data.epics.forEach(epic => {
                                log('info', `  Epic: ${epic.title || epic.id || JSON.stringify(epic)}`);
                            });
                        }
                    }
                    else if (msg.event === 'client-fuel-ipc' && ['blocked_tasks', 'completed_tasks'].includes(data?.type)) {
                        const label = data.type.replace('_', ' ');
                        log('info', `Received ${data.total || 0} ${label}`);
                        if (data.tasks && Array.isArray(data.tasks)) {
                            data.tasks.forEach(task => {
                                log('info', `  ${task.id || '?'}: ${task.title || 'untitled'}${task.status ? ` [${task.status}]` : ''}`);
                            });
                        }
                    }
                    else if (msg.event === 'client-fuel-ipc' && data?.type === 'config_reloaded') {
                        log('info', 'Config reloaded successfully');
                    }
                } catch (e) {
                    log('error', `Failed to parse: ${e.message}`);
                }
            };

            ws.onerror = () => { log('error', 'WebSocket error'); };

            ws.onclose = (event) => {
                log('info', `Connection closed: ${event.code} ${event.reason}`);
                socketId = null;
                memberCount = 0;
                daemonConnected = false;
                hasReceivedSnapshot = false;
                members.clear();
                activeTasks.clear();
                readyTasks = [];
                inProgressTasks = [];
                updateBadges();
                updateControlsState();
                renderKanban();
                setTimeout(() => { log('info', 'Reconnecting...'); connect(); }, 3000);
            };
        }

        // Enter key submits task form
        document.getElementById('task-title').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') createTask();
        });

        // Start
        log('info', `User ID: ${userId}`);
        log('info', `Channel: ${channel}`);
        connect();
    </script>
</body>
</html>
